name: Validate Release

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate Release PR
    if: startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: validate-${{ github.event.pull_request.head.ref }}
      cancel-in-progress: true
    permissions:
      contents: read

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6

      - name: Extract tag from branch
        id: meta
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          if ! [[ "${BRANCH}" =~ ^release/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Branch '${BRANCH}' does not match release/vX.Y.Z convention."
            exit 1
          fi
          tag="${BRANCH#release/}"
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Validate release artifacts
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail

          pkg_version="$(jq -r '.version' package.json)"
          if [ "${pkg_version}" != "${VERSION}" ]; then
            echo "::error::package.json version (${pkg_version}) does not match release tag (${VERSION})."
            exit 1
          fi

          for f in dist/safe-sdk.esm.min.js dist/safe-sdk.umd.min.js; do
            if [ ! -s "${f}" ]; then
              echo "::error::${f} is missing or empty."
              exit 1
            fi
          done

          if [ ! -f LICENSE ]; then
            echo "::error::LICENSE is missing."
            exit 1
          fi
        shell: bash

      - name: Validate changelog entry
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          python3 << 'PY'
          import re, os, sys
          content = open('CHANGELOG.md').read()
          version = os.environ['VERSION']
          pattern = rf'## \[{re.escape(version)}\].*?(?=\n## \[|\Z)'
          match = re.search(pattern, content, re.DOTALL)
          if not match:
              print(f'::error::No CHANGELOG.md section found for [{version}]. Fill it in before merging.', file=sys.stderr)
              sys.exit(1)
          body = match.group(0).strip()
          body = re.sub(r'\n+---\s*$', '', body).strip()
          content_lines = [
              l for l in body.splitlines()
              if l.strip()
              and not l.startswith('#')
              and not l.startswith('**Upstream release:')
          ]
          if not content_lines:
              print(f'::error::CHANGELOG.md section for [{version}] has no content. Fill it in before merging.', file=sys.stderr)
              sys.exit(1)
          PY
        shell: bash

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Validate npm package contents
        run: |
          set -euo pipefail
          npm pack --dry-run
        shell: bash
