name: Create Release

on:
  pull_request:
    types: [closed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    name: Create GitHub Release
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Extract tag from branch
        id: meta
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          tag="${BRANCH#release/}"
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Extract changelog entry
        id: notes
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          python3 << 'PY'
          import re, os
          content = open('CHANGELOG.md').read()
          version = os.environ['VERSION']
          pattern = rf'## \[{re.escape(version)}\].*?(?=\n## \[|\Z)'
          match = re.search(pattern, content, re.DOTALL)
          body = match.group(0).strip() if match else f'## [{version}]'
          body = re.sub(r'\n+---\s*$', '', body).strip()
          with open('/tmp/release-notes.md', 'w') as f:
              f.write(body)
          PY
        shell: bash

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" &>/dev/null; then
            gh release edit "${TAG}" \
              --title "${TAG}" \
              --notes-file /tmp/release-notes.md
          else
            gh release create "${TAG}" \
              --title "${TAG}" \
              --notes-file /tmp/release-notes.md
          fi
        shell: bash

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          npm_version="$(npm view "@bespot/gatekeeper-web-sdk@${VERSION}" version 2>/dev/null || true)"
          if [ -n "${npm_version}" ]; then
            echo "::warning::@bespot/gatekeeper-web-sdk@${VERSION} already on npm; skipping."
            exit 0
          fi
          npm publish --provenance --access public
        shell: bash
