<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gatekeeper SDK — UMD template</title>
  </head>
  <body>
    <h1>Gatekeeper SDK (UMD)</h1>
    <p>Open the browser console for SDK output.</p>

    <!--
      Prerequisites:
      1. Download safe-sdk.umd.min.js from GitHub Releases and host it
      2. Implement GET /api/gatekeeper-token on your backend
      Load order: runtime config FIRST, then SDK bundle.
    -->
    <script src="./runtime-config.example.js"></script>
    <script src="./sdk/safe-sdk.umd.min.js"></script>
    <script>
      ;(async function startGatekeeper() {
        const sdk = new window.SafeSDK()

        try {
          const response = await fetch('/api/gatekeeper-token')
          if (!response.ok) {
            throw new Error('Could not fetch Gatekeeper token from backend')
          }
          const jwt = (await response.text()).trim()
          if (!jwt) {
            throw new Error('Backend returned an empty token')
          }

          await sdk.initialize(jwt)

          sdk.setUserId('client-user-123')

          const result = await sdk.check()
          if (result instanceof Error) {
            console.error('[CHECK FAILED]', result.name, '-', result.message)
            return
          }
          console.log('[CHECK OK]', {
            action: result.action,
            ticket: result.ticket,
          })

          // Start periodic checks — interval configured server-side by Bespot
          await sdk.subscribe()
          // After each periodic check, read the latest result:
          // sdk.lastCheckResult — CheckResult on success, Failure on error

          // sdk.unsubscribe()
        } catch (error) {
          const err = error instanceof Error ? error : new Error(String(error))
          console.error('[INITIALIZE FAILED]', err.name, '-', err.message)
        }
      })()
    </script>
  </body>
</html>
